# Version-cut automation (#8), mirroring qwts/image-trail and qwts/photos:
#
#  1. version-pr — while changesets are pending, keep one rolling version PR open and current.
#     Merging that PR is the human "cut a release" action.
#  2. tag — after the version PR merges (package version changed, no pending changesets), tag
#     v<version> and hand off to the release workflow.
#
# GITHUB_TOKEN events cannot trigger other workflows, so this workflow also:
#  - dispatches CI onto the bot-refreshed version branch;
#  - explicitly dispatches release.yml after pushing the version tag.
name: Version cut

on:
  push:
    branches:
      - main
  # Manual refresh / recovery for a cut whose tag or release dispatch failed.
  workflow_dispatch:

concurrency:
  group: version-cut
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  version-pr:
    name: Version packages PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create or refresh the ready version PR
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          # changeset:version also syncs public/manifest.json and package-lock.json, so the
          # version PR lands every version artifact in one reviewed commit.
          version: npm run changeset:version
          title: "chore: version bookmarkit"
          commit: "chore: version bookmarkit"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run required checks on the version branch
        if: steps.changesets.outputs.hasChangesets == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run ci.yml --ref changeset-release/main

  tag:
    name: Tag version merges
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc

      - name: Tag when the current version is a fresh cut
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          # A normal main push is a release cut only when package.json's version changed. Manual
          # dispatch is recovery-only and still must pass the checks below.
          if [ "$EVENT_NAME" = "push" ]; then
            prev=$(git show 'HEAD~1:package.json' 2>/dev/null | node -p 'JSON.parse(require("fs").readFileSync(0,"utf8")).version' 2>/dev/null || echo '')
            cur=$(node -p 'require("./package.json").version')
            if [ "$prev" = "$cur" ]; then
              echo "Version unchanged ($cur) — not a version-cut merge."
              exit 0
            fi
          fi

          pending=$(find .changeset -name '*.md' ! -name 'README.md' | head -1)
          if [ -n "$pending" ]; then
            echo "Changesets pending — nothing to tag."
            exit 0
          fi

          # Refuse to tag a tree whose version artifacts disagree; the tag name comes from
          # package.json, so drift here would ship a mislabeled zip.
          npm run check:version-policy
          version="v$(node -p 'require("./package.json").version')"

          if git rev-parse -q --verify "refs/tags/$version" >/dev/null; then
            echo "$version already tagged."
            if ! gh release view "$version" >/dev/null 2>&1; then
              echo "$version has no release — dispatching recovery."
              gh workflow run release.yml --ref main -f tag="$version"
            fi
            exit 0
          fi

          # Create the annotated tag through the API. Checkout credentials stay disabled, so the
          # workflow token is never persisted in .git/config or exposed to later tooling.
          tag_object=$(gh api "repos/$GITHUB_REPOSITORY/git/tags" \
            -f tag="$version" \
            -f message="bookmarkit $version" \
            -f object="$GITHUB_SHA" \
            -f type=commit \
            --jq .sha)
          gh api "repos/$GITHUB_REPOSITORY/git/refs" \
            -f ref="refs/tags/$version" \
            -f sha="$tag_object" >/dev/null
          echo "Tagged $version."

          # A tag created with GITHUB_TOKEN does not emit a new workflow run. Dispatch the trusted
          # workflow from main while selecting the immutable, ancestry-checked tag as build input.
          gh workflow run release.yml --ref main -f tag="$version"
